  ios: true
  web: true
  fullscreen: true
  color: "#ffffff"
  android_gravity: center
  ios_content_mode: scaleAspectFill
  image: "assets/images/logoApp.png"
dev_dependencies:
  flutter_test:
    sdk: flutter
#  flutter pub run flutter_native_splash:create
