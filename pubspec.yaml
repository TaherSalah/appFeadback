  freezed: ^2.4.6
  json_serializable: ^6.7.1
  objectbox_generator: ^4.1.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/json/
    - assets/json/
    - assets/icons/
    - assets/athan/
    - assets/svg/
    - assets/svg/book_name/
    - assets/svg/hijri/
    - assets/json/books_data/abudawud_books/
    - assets/json/books_data/adab_books/
    - assets/json/books_data/ahmad_books/
    - assets/json/books_data/bukhari_books/
    - assets/json/books_data/bulugh_books/
    - assets/json/books_data/darimi_books/
    - assets/json/books_data/forty_books/
    - assets/json/books_data/ibnmajah_books/
    - assets/json/books_data/malik_books/
    - assets/json/books_data/mishkat_books/
    - assets/json/books_data/muslim_books/
    - assets/json/books_data/nasai_books/
    - assets/json/books_data/riyadussalihin_books/
    - assets/json/books_data/shamail_books/
    - assets/json/books_data/tirmidhi_books/

  fonts:
    - family: maja
      fonts:
        - asset: assets/fonts/majalla.ttf
    - family: me_quran
      fonts:
        - asset: assets/fonts/quraan.ttf

    - family: me
      fonts:
        - asset: assets/fonts/KFGQPC.ttf
    - family: GT Sectra Fine
      fonts:
        - asset: assets/fonts/gt_fine/GT Sectra Fine Regular.ttf
    - family: cairo
      fonts:
        - asset: assets/fonts/cairo/Cairo-Black.ttf
        - asset: assets/fonts/cairo/Cairo-Bold.ttf
        - asset: assets/fonts/cairo/Cairo-ExtraLight.ttf
        - asset: assets/fonts/cairo/Cairo-Regular.ttf

    - family: othman
      fonts:
        - asset: assets/fonts/othmaini/Othmani.ttf
    - family: othmanV2
      fonts:
        - asset: assets/fonts/othmaini/UthmanicHafs_V20.ttf

flutter_launcher_icons:
  image_path: "assets/images/logoApp.png"
  image_path_android: "assets/images/logoApp.png"
  image_path_ios: "assets/images/logoApp.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"

  android: "launcher_icon"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logoApp.png"

  ios: true
  remove_alpha_channel_ios: true
